<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--green);color:#fff;padding:.9rem 1rem 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}

.sw input::placeholder{color:rgba(255,255,255,.55)}

.si{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);opacity:.65;font-size:.85rem;pointer-events:none}
.xb{position:absolute;right:.65rem;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.28);border:none;color:#fff;width:18px;height:18px;border-radius:50%;font-size:.7rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:.55rem;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:.25rem .7rem;border-radius:20px;border:1.5px solid rgba(255,255,255,.35);background:transparent;color:rgba(255,255,255,.8);font-size:.74rem;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s}
.tab.on{background:#fff;border-color:#fff;color:var(--green);font-weight:700}
.bar{padding:.45rem .85rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.barleft{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.cnt{font-size:.75rem;color:var(--muted);white-space:nowrap}
.cnt strong{color:var(--green);font-weight:700}
.stabs{display:flex;gap:4px}
.stab{padding:.22rem .6rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;font-family:inherit;cursor:pointer;white-space:nowrap}
.stab.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.sel{border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.75rem;font-family:inherit;padding:.28rem .55rem;border-radius:6px;outline:none;flex-shrink:0}
.lst{padding:.5rem .7rem;display:flex;flex-direction:column;gap:3px}
.row{background:var(--surface);border-radius:9px;padding:.65rem .85rem;display:flex;align-items:flex-start;gap:8px;border:1px solid var(--border);-webkit-user-select:none}
.row:active{background:var(--pale)}
.num{font-size:.74rem;font-weight:700;color:var(--green);min-width:34px;background:var(--pale);padding:2px 5px;border-radius:4px;text-align:center;margin-top:2px;flex-shrink:0}
.inf{flex:1;min-width:0}
.ttl{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lyr{font-size:.72rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.key{font-size:.68rem;color:var(--hint);margin-top:2px}
.key span{display:inline-block;background:#f0ece0;color:#555;padding:1px 5px;border-radius:3px;font-weight:600}
mark{background:#ffe082;color:#333;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.88rem}
.pg{display:flex;align-items:center;justify-content:center;gap:8px;padding:.9rem}
.pgb{padding:.45rem 1.1rem;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:.82rem;font-family:inherit;font-weight:500;cursor:pointer}
.pgb:disabled{opacity:.35;cursor:default}
.pgb:not(:disabled):active{background:var(--pale)}
.pgi{font-size:.78rem;color:var(--muted);min-width:55px;text-align:center}
.fab{position:fixed;bottom:1.2rem;right:1rem;width:44px;height:44px;background:var(--green);color:#fff;border:none;border-radius:50%;font-size:1.2rem;box-shadow:0 3px 12px rgba(30,92,14,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(.9)}

const RL={all:[0,9999],"1001":[1001,1499],"1500":[1500,1999],"2000":[2000,2350],"2351":[2351,2550]};
const KO=["C","C#","Db","D","D#","Eb","E","F","F#","Gb","G","G#","Ab","A","A#","Bb","B","Cm","C#m","Dbm","Dm","D#m","Ebm","Em","Fm","F#m","Gbm","Gm","G#m","Abm","Am","A#m","Bbm","Bm","c"];
let rng="all",mode="all",pg=1;
const PS=30;
function hl(t,q){if(!q||!t)return t||"";const i=t.toLowerCase().indexOf(q);if(i<0)return t;return t.slice(0,i)+"<mark>"+t.slice(i,i+q.length)+"</mark>"+t.slice(i+q.length);}
function filt(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const[lo,hi]=RL[rng];
  const srt=document.getElementById("srt").value;
  let a=S.filter(x=>{
    if(x.num<lo||x.num>hi)return false;
    if(!q)return true;
    const nM=x.num.toString().includes(q);
    const tM=x.title.toLowerCase().includes(q);
    const lM=(x.lyric||"").toLowerCase().includes(q);
    const kM=x.key.toLowerCase().includes(q);
    if(mode==="title")return nM||tM||kM;
    if(mode==="lyric")return nM||lM||kM;
    return nM||tM||lM||kM;
  });
  if(srt==="title")a.sort((a,b)=>a.title.localeCompare(b.title,"ko"));
  else if(srt==="key")a.sort((a,b)=>{const ai=KO.indexOf(a.key),bi=KO.indexOf(b.key);return(ai<0?99:ai)-(bi<0?99:bi)||a.num-b.num;});
  return[a,q];
}
function go(p){
  if(p)pg=p;
  const[songs,q]=filt();
  const tot=songs.length,pages=Math.max(1,Math.ceil(tot/PS));
  if(pg>pages)pg=pages;
  const sl=songs.slice((pg-1)*PS,pg*PS);
  document.getElementById("cnt").innerHTML="<strong>"+tot+"</strong>곡";
  document.getElementById("xb").style.display=document.getElementById("q").value?"flex":"none";
  const lst=document.getElementById("lst");
  if(!sl.length){lst.innerHTML='<div class="empty">검색 결과가 없어요 🔍</div>';document.getElementById("pg").innerHTML="";return;}
  lst.innerHTML=sl.map(s=>{
    const lyr=s.lyric?`<div class="lyr">${hl(s.lyric,q)}</div>`:"";
    return`<div class="row"><span class="num">${hl(s.num.toString(),q)}</span><div class="inf"><div class="ttl">${hl(s.title,q)}</div>${lyr}<div class="key">조표 <span>${hl(s.key,q)}</span></div></div></div>`;
  }).join("");
  const pgEl=document.getElementById("pg");
  if(pages<=1){pgEl.innerHTML="";return;}
  pgEl.innerHTML=`<button class="pgb" onclick="go(${pg-1});window.scrollTo({top:0})" ${pg<=1?"disabled":""}>&#9664; 이전</button><span class="pgi">${pg}/${pages}</span><button class="pgb" onclick="go(${pg+1});window.scrollTo({top:0})" ${pg>=pages?"disabled":""}>다음 &#9654;</button>`;
}
function clr(){document.getElementById("q").value="";go(1);}
function setR(el){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));el.classList.add("on");rng=el.dataset.r;go(1);}
function setM(el){document.querySelectorAll(".stab").forEach(t=>t.classList.remove("on"));el.classList.add("on");mode=el.dataset.m;go(1);}
go(1);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
